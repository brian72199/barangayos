services:
  pocketbase:
    build: .
    container_name: barangay-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    environment:
      - GOMEMLIMIT=512MiB
    command: >
      /pb/pocketbase serve
      --http=0.0.0.0:8090
      --dir=/pb/pb_data
      --migrationsDir=/pb/pb_migrations
      --automigrate

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: barangay-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - pocketbase

volumes:
  pb_data:
